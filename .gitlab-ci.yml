# .gitlab-ci.yml

stages:
  - build
  - deploy

default:
  image: node:20-alpine

cache:
  key:
    files:
      - package-lock.json   # cache invalidé UNIQUEMENT si les dépendances changent
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci --prefer-offline   # utilise le cache, ne retélécharge pas si déjà là
    - npm run build
    - mv build public
  artifacts:
    paths:
      - public/
    expire_in: 3 days

pages:
  stage: deploy
  script:
    - echo "Deploying…"
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH